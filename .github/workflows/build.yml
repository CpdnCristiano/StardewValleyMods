name: Build

on:
  workflow_dispatch:  # ← só roda quando você clicar o botão manualmente

permissions:
  contents: write

jobs:
  build-apt:
    name: Build StardewArchipelagoTranslations
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. .NET 6 ──────────────────────────────────────────────────────
      - name: Configurar .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      # ── 3. Ler versão do manifest.json ─────────────────────────────────
      - name: Ler versão do manifest.json
        id: version
        run: |
          VERSION=$(jq -r '.Version' StardewArchipelagoTranslations/manifest.json)
          echo "Versão encontrada: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ── 4. Build ───────────────────────────────────────────────────────
      - name: Build
        run: |
          mkdir -p dist
          dotnet build StardewArchipelagoTranslations/StardewArchipelagoTranslations.csproj \
            -c Release \
            /p:EnableModDeploy=false \
            /p:EnableModZip=true \
            /p:ModZipPath="$GITHUB_WORKSPACE/dist"

          ZIP_NAME="StardewArchipelagoTranslations-v${{ steps.version.outputs.version }}.zip"
          mv dist/*.zip "dist/$ZIP_NAME"
          echo "Arquivo gerado: dist/$ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
        env:
          DOTNET_NOLOGO: true

      # ── 5. Salvar artefato (em todo push/PR) ──────────────────────────
      - name: Salvar artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: dist/${{ env.ZIP_NAME }}
          if-no-files-found: error
          retention-days: 7

      # ── 6. GitHub Release (somente no botão manual) ───────────────────
      - name: Criar GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "Stardew Archipelago Translations v${{ steps.version.outputs.version }}"
          body: |
            ## 🎮 Stardew Archipelago Translations v${{ steps.version.outputs.version }}

            Mod de tradução standalone para o [StardewArchipelago](https://github.com/KaitoKid/StardewArchipelago).

            ### 📦 Instalação
            1. Baixe o arquivo `.zip` abaixo
            2. Extraia dentro da pasta `Mods` do Stardew Valley
            3. Certifique-se de ter o [StardewArchipelago](https://github.com/KaitoKid/StardewArchipelago) instalado

            ### 🌐 Idiomas suportados
            - 🇧🇷 Português (pt)
          files: dist/${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
