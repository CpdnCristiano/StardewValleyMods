name: Build

on:
  push:
    branches: [ master ]
    tags:
      - "apt-v*"
    paths:
      - '.github/workflows/build.yml'
      - 'StardewArchipelagoTranslations/**'
      - 'lib/**'
  pull_request:
    paths:
      - '.github/workflows/build.yml'
      - 'StardewArchipelagoTranslations/**'
      - 'lib/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apt:
    name: Build StardewArchipelagoTranslations
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. .NET 6 ──────────────────────────────────────────────────────
      - name: Configurar .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      # ── 3. Build ───────────────────────────────────────────────────────
      # StardewArchipelago.dll está em lib/ no próprio repo.
      # ModBuildConfig v4+ já inclui as DLLs do Stardew via NuGet.
      # Sem Steam, sem downloads externos, sem secrets!
      - name: Build
        run: |
          mkdir -p dist
          dotnet build StardewArchipelagoTranslations/StardewArchipelagoTranslations.csproj \
            -c Release \
            /p:EnableModDeploy=false \
            /p:EnableModZip=true \
            /p:ModZipPath="$GITHUB_WORKSPACE/dist"
          echo "dist output: $(ls dist)"
          ZIP_NAME="$(ls dist/*.zip | head -1 | xargs basename)"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
        env:
          DOTNET_NOLOGO: true

      # ── 4. Salvar artefato ─────────────────────────────────────────────
      - name: Salvar artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: dist/${{ env.ZIP_NAME }}
          if-no-files-found: error
          retention-days: 7

      # ── 5. GitHub Release (somente em tags apt-v*) ────────────────────
      - name: Criar GitHub Release
        if: startsWith(github.ref, 'refs/tags/apt-v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Stardew Archipelago Translations ${{ github.ref_name }}"
          body: |
            ## 🎮 Stardew Archipelago Translations ${{ github.ref_name }}

            Mod de tradução standalone para o [StardewArchipelago](https://github.com/KaitoKid/StardewArchipelago).

            ### 📦 Instalação
            1. Baixe o arquivo `.zip` abaixo
            2. Extraia dentro da pasta `Mods` do Stardew Valley
            3. Certifique-se de ter o [StardewArchipelago](https://github.com/KaitoKid/StardewArchipelago) instalado

            ### 🌐 Idiomas suportados
            - 🇧🇷 Português (pt)
          files: dist/${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
